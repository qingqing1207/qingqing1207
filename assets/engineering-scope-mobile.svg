<svg xmlns="http://www.w3.org/2000/svg" width="600" height="620" viewBox="0 0 600 620" role="img" aria-labelledby="title description">
  <title id="title">Engineering scope</title>
  <desc id="description">Three engineering capabilities: agent systems, product infrastructure, and frontend experience.</desc>
  <style>
    :root { color-scheme: light dark; }
    .card { fill: #ffffff; stroke: #dbe3ef; }
    .primary { fill: #111827; }
    .secondary { fill: #637187; }
    .label { fill: #315ed4; }
    .accent { fill: #4f6ee8; }
    @media (prefers-color-scheme: dark) {
      .card { fill: #101827; stroke: #2a3952; }
      .primary { fill: #f3f6fb; }
      .secondary { fill: #9eacc0; }
      .label { fill: #8ba6ff; }
      .accent { fill: #7898fa; }
    }
  </style>

  <rect class="card" x="20" y="12" width="560" height="184" rx="14" />
  <rect class="accent" x="46" y="38" width="40" height="5" rx="2.5" />
  <text class="label" x="46" y="74" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="13" font-weight="700" letter-spacing="1.4">01 / CONTROL</text>
  <text class="primary" x="46" y="117" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="25" font-weight="700">Agent Systems</text>
  <text class="secondary" x="46" y="153" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="17">Tools · MCP · Context · Guardrails · Review loops</text>

  <rect class="card" x="20" y="218" width="560" height="184" rx="14" />
  <rect class="accent" x="46" y="244" width="40" height="5" rx="2.5" />
  <text class="label" x="46" y="280" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="13" font-weight="700" letter-spacing="1.4">02 / DELIVERY</text>
  <text class="primary" x="46" y="323" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="25" font-weight="700">Product Infrastructure</text>
  <text class="secondary" x="46" y="359" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="17">APIs · Workers · Data · Storage · Payments</text>

  <rect class="card" x="20" y="424" width="560" height="184" rx="14" />
  <rect class="accent" x="46" y="450" width="40" height="5" rx="2.5" />
  <text class="label" x="46" y="486" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="13" font-weight="700" letter-spacing="1.4">03 / EXPERIENCE</text>
  <text class="primary" x="46" y="529" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="25" font-weight="700">Frontend Experience</text>
  <text class="secondary" x="46" y="565" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="17">Architecture · Visualization · Complex UX · Performance</text>
</svg>
